services:
  conquisterco:
    build: .
    image: conquisterco
    restart: always
    # esposto solo su localhost: davanti ci sta Caddy come reverse proxy
    ports:
      - "127.0.0.1:8077:8077"
    volumes:
      # DB (conquisterco.db) e selfie (media/) persistono qui, fuori dall'immagine
      - ./data:/data
    environment:
      # OBBLIGATORIO: secret di sessione, letto da ./.env (gitignored).
      # Senza, le sessioni saltano a ogni restart. Errore chiaro se manca.
      CONQUISTERCO_SECRET: "${CONQUISTERCO_SECRET:?metti CONQUISTERCO_SECRET in .env}"
      # niente auto-seed demo: si usano i dati veri messi in ./data
      CONQUISTERCO_DEMO: "0"
      CONQUISTERCO_DB: /data/conquisterco.db
      CONQUISTERCO_MEDIA: /data/media
