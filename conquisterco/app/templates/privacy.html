<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conquisterco — {{ T.privacy }}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ static_v }}">
</head>
<body>
  <header>
    <div class="brand">💩 <b>Conquisterco</b> <span class="tag">{{ T.tag_privacy }}</span></div>
    <div class="auth">
      <span class="lang-sel">
        <a href="/lang/it" class="{{ 'lang-on' if lang == 'it' else '' }}">IT</a>
        <a href="/lang/en" class="{{ 'lang-on' if lang == 'en' else '' }}">EN</a>
      </span>
      <a href="/"><button>{{ T.btn_map }}</button></a>
    </div>
  </header>

  <div class="prof-wrap">
    <div class="card" style="max-width:640px;margin:0 auto">
      <h1 style="margin-top:0">{{ T.priv_title }}</h1>
      <p class="muted">{{ T.priv_intro }}</p>

      <ul class="privacy-list">
        <li>{{ T.priv_1 | safe }}</li>
        <li>{{ T.priv_2 | safe }}</li>
        <li>{{ T.priv_3 | safe }}</li>
        <li>{{ T.priv_4 | safe }}</li>
        <li>{{ T.priv_5 | safe }}</li>
        <li>{{ T.priv_6 | safe }}</li>
        <li>{{ T.priv_7 | safe }}</li>
      </ul>

      <p class="muted">{{ T.priv_outro }}</p>
    </div>
  </div>
</body>
</html>
